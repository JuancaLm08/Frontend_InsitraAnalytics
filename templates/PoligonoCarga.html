 <!-- Elementos css de la Seccion Poligono de Carga -->
<title>Insitra Analytics: Polígono de Carga</title>
<link rel="stylesheet" href="../static/css/estilo_PoligonoCarga.css">

<div id="section-poligono-carga" style="display: none;">

    <!-- ANIMACION DE CARGA -->
    <div id="loader-poligono-carga" class="section-loader" style="display: none;">
        <div class="lottie-anim-canvas"></div>
    </div>

    <p class="section-subtitle"><b>Polígono de Carga</b></p>
    <div id="no-data-banner-poligono-carga" class="status-banner" style="display:none;">
        No hay datos para los filtros seleccionados.
    </div>

    <div id="poligono-carga-content">

        <!-- TABS -->
        <div class="tabs-poligono">
            <button class="tab-btn active" data-tab="franja-horaria">
                🕘 Por franja horaria
            </button>
            <button class="tab-btn" data-tab="estacion-maestra">
                🚩 Por estación maestra
            </button>
        </div>

        <!-- TAB 1: POR FRANJA HORARIA -->
        <div id="tab-franja-horaria" class="tab-content">

            <!-- Filtros tab 1 -->
            <div class="filtros-poligono">
                <div class="filtro-grupo">
                    <label for="fecha-franja">Fecha</label>
                    <input type="date" id="fecha-franja" class="filtro-input" max="">
                </div>
                <div class="filtro-grupo">
                    <label for="ruta-franja">Ruta</label>
                    <select id="ruta-franja" class="filtro-input">
                        <option value="">-- Selecciona una ruta --</option>
                    </select>
                </div>
                <button id="btn-consultar-franja" class="btn-consultar">
                    Consultar
                </button>
            </div>

            <!-- Slider de horas -->
            <div class="slider-container" id="slider-box" style="display:none;">
                <label id="label-hora-slider">Franja horaria: 06:00 - 07:00</label>
                <input type="range" id="slider-hora"
                       min="6" max="22" step="1" value="6"
                       class="hora-slider">
                <div class="slider-marcas">
                    <span id="slider-marca-inicio">06:00</span>
                    <span>12:00</span>
                    <span>18:00</span>
                    <span id="slider-marca-fin">22:00</span>
                </div>
            </div>

            <!-- Gráfica polígono de carga -->
            <div class="chart-box" id="chart-franja-box" style="display:none;">
                <h2 id="titulo-grafica-franja">Polígono de carga</h2>
                <div id="chart-poligono-franja" style="height: 400px;"></div>
            </div>

        </div>

<!-- TAB 2: POR ESTACIÓN MAESTRA -->
<div id="tab-estacion-maestra" class="tab-content" style="display:none;">

    <!-- Filtros tab 2 -->
    <div class="filtros-poligono">
        <div class="filtro-grupo">
            <label for="fecha-estacion">Fecha</label>
            <input type="date" id="fecha-estacion" class="filtro-input">
        </div>
        <div class="filtro-grupo">
            <label for="ruta-estacion">Ruta</label>
            <select id="ruta-estacion" class="filtro-input">
                <option value="">-- Selecciona una ruta --</option>
            </select>
        </div>
        <button id="btn-consultar-estacion" class="btn-consultar">
            Consultar
        </button>
    </div>

    <div id="estacion-maestra-layout" style="display:none;">

        <!-- Gráfica arriba a ancho completo -->
        <div class="estacion-detalle-box" id="detalle-estacion-box">
            <div id="detalle-placeholder" style="display:flex;">
                <img src="../static/images/insitra_logo.png"
                     id="img-placeholder-estacion"
                     alt="Selecciona una estación">
                <p>Selecciona una estación de la lista para ver su detalle</p>
            </div>
            <h3 id="titulo-detalle-estacion" style="display:none;"></h3>
            <div id="chart-detalle-estacion" style="height: 350px; display:none;"></div>
        </div>

        <!-- Grid de tarjetas abajo -->
        <h3 class="grid-titulo">Estaciones maestras por franja horaria</h3>
        <div id="grid-estaciones-maestras" class="estacion-maestra-cards"></div>

    </div>
</div>
    <!-- cierre de #tab-estacion-maestra -->

    </div>
    <!-- cierre de #poligono-carga-content -->

</div>
<!-- cierre de #section-poligono-carga -->

<!-- JavaScript de la Seccion Poligono de Carga -->
<script src="../static/js/js_PoligonoCarga.js"></script>
