<!-- Elemenstos css de la Seccion Ruta -->
<link rel="stylesheet" href="../static/css/estilo_Ruta.css"> 

<div id="section-ruta">
    <!-- ANIMACION DE CARGA PARA RUTA -->
    <div id="loader-ruta" class="section-loader" style="display: none;">
        <div class="lottie-anim-canvas"></div>
    </div>

    <p class="section-subtitle"><b>Cuenca de Servicio</b></p>

    <!----- FILTROS POR FECHA Y RANGO DE HORAS ----->
    <div class="date-filter-header">
        <div class="date-filter-container">
            <div class="date-group">
                <label for="fecha-ruta">Fecha</label>
                <input type="date" id="fecha-ruta">
            </div>
            <div class="date-group">
                <label>Hora Inicio</label>
                <div class="time-select-group">
                    <select id="hora-inicio-h-ruta" aria-label="Hora inicio - horas"></select>
                    <span class="time-separator">:</span>
                    <select id="hora-inicio-m-ruta" aria-label="Hora inicio - minutos"></select>
                </div>
            </div>
            <div class="date-group">
                <label>Hora Final</label>
                <div class="time-select-group">
                    <select id="hora-final-h-ruta" aria-label="Hora final - horas"></select>
                    <span class="time-separator">:</span>
                    <select id="hora-final-m-ruta" aria-label="Hora final - minutos"></select>
                </div>
            </div>
        </div>
        <button id="btn-reset-horas-ruta" class="btn-reset-horas" title="Restaurar rango horario a 00:00 – 23:59">
            <span>↺</span> Resetear horas
        </button>
    </div>

    <div id="no-data-banner-ruta" class="status-banner">No hay datos para los filtros seleccionados.</div>

    <div id="ruta-content" style="display: none;">
        <div class="map-header">
            <p class="section-subtitle"><b>Resultados en la zona dibujada</b></p>
            <button id="btn-limpiar" class="btn-limpiar" style="display: none;"><span>🧹</span> Limpiar selección</button>
        </div>

        <div class="map-metrics">
            <div id = "valor-pasajeros" class="map-metric-item" style="display: none;">
                <label>Pasajeros</label>
                <p id="map-pasajeros-val">—</p>
            </div>
            <!-- <div id = "valor-descensos" class="map-metric-item" style="display: none;">
                <label>Descensos (off)</label>
                <p id="map-descensos-val">—</p>
            </div> -->
        </div>

        <div class="map-container">
            <div id="map-canvas" style="width: 100%; height: 100%;"></div>
        </div>

        <br>
        <div id = "info-message-blue" class="info-message-blue">Dibuja o termina de cerrar el polígono/rectángulo para ver los totales.</div>

        <details id = "data-expander-ruta" class="data-expander" style="display: none;">
            <summary>Ver puntos dentro de la zona</summary>
            <button class="btn-download" onclick="exportTableToCSV('tabla-ruta')"> 
                <svg class="download-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>    
            </button>
            <div class="table-container">
                <table id="tabla-ruta">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </details>
    </div>
</div>
<br>

<!-- JavaScript de la Seccion Ruta -->
<script src="../static/js/js_Ruta.js"></script>
