version: '3.8'

services:
  frontend:
    build: .
    container_name: frontend_analytics
    ports:
      #- "5000:5000"
      - "80:5000"
    env_file:
      - secrets.env
    volumes:
      - .:/app
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
